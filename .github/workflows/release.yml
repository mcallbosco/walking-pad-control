name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve version
        id: version
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "name=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "dist/walkingpad-control-${{ steps.version.outputs.name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Walking Pad Control ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/walkingpad-control-${{ steps.version.outputs.name }}.apk
